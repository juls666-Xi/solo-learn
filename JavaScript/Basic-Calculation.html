<!DOCTYPE html>
<html lang="en">
<head>
<style>
  table { border-collapse: collapse; width: 80%; font-family: sans-serif; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 12px; text-align: center; }
  th { background-color: #f8f9fa; }
  input { width: 60px; padding: 5px; text-align: center; }
  .grade-f { color: #d93025; font-weight: bold; } /* Red for Fail */
  .grade-pass { color: #188038; font-weight: bold; } /* Green for A+ */
</style>
</head>
<body>

<h2>Automatic Grade Calculator</h2>

<table>
  <thead>
    <tr>
      <th>Student Name</th>
      <th>Score 1</th>
      <th>Score 2</th>
      <th>Average</th>
      <th>Letter Grade</th>
    </tr>
  </thead>
  <tbody id="gradeTable">
    <tr>
      <td><input type="text" placeholder="Enter name" style="width: 120px;"></td>
      <td><input type="number" class="score1" value="0" min="0" max="100" oninput="updateRow(this)"></td>
      <td><input type="number" class="score2" value="0" min="0" max="100" oninput="updateRow(this)"></td>
      <td class="avg-cell">0.00</td>
      <td class="remark-cell">-</td>
    </tr>
  </tbody>
</table>

<script>
function updateRow(input) {
  // Find the row containing the changed input
  let row = input.closest('tr');
  let s1 = parseFloat(row.querySelector('.score1').value) || 0;
  let s2 = parseFloat(row.querySelector('.score2').value) || 0;
  
  // Calculate average
  let average = (s1 + s2) / 2;
  row.querySelector('.avg-cell').innerText = average.toFixed(2);
  
  // Determine Grade based on your scale
  let remarkCell = row.querySelector('.remark-cell');
  let grade = "";
  let className = "";

  if (average >= 90) { grade = "A+"; className = "grade-pass"; }
  else if (average >= 80) { grade = "A"; }
  else if (average >= 70) { grade = "B"; }
  else if (average >= 60) { grade = "C"; }
  else if (average >= 50) { grade = "D"; }
  else { grade = "F"; className = "grade-f"; }

  remarkCell.innerText = grade;
  remarkCell.className = "remark-cell " + className;
}
</script>

</body>
</html>
